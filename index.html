<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{nomeEmpresa}} | {{slogan}}</title>
  
  <meta name="description" content="{{metaDescricao}}" />
  <meta property="og:title" content="{{nomeEmpresa}}" />
  <meta property="og:description" content="{{slogan}}" />
  <meta property="og:image" content="{{linkImagemOg}}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{fonteCorpo}}:wght@300;400;600&family={{fonteTitulo}}:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: {{corPrimaria}};
      --primary-hover: {{corPrimariaHover}};
      --font-title: '{{fonteTitulo}}', serif;
      --font-body: '{{fonteCorpo}}', sans-serif;
      --dark: #0a0a0a;
      --gray: #1a1a1a;
      --text: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--dark); color: var(--text); scroll-behavior: smooth; }
    
    .container { max-width: 1200px; mx-auto; padding: 0 2rem; }
    .btn { padding: 1rem 2rem; background: var(--primary); color: white; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; display: inline-block; border: none; cursor: pointer; }
    .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

    /* Header */
    header { padding: 2rem 0; position: absolute; width: 100%; z-index: 10; }
    .nav { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-title); font-size: 1.8rem; color: var(--primary); text-decoration: none; }

    /* Hero */
    .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('{{linkImagemHero}}'); background-size: cover; background-position: center; display: flex; align-items: center; text-align: center; }
    .hero-content h1 { font-family: var(--font-title); font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 1rem; }
    .hero-content p { font-size: 1.2rem; color: #ccc; margin-bottom: 2rem; }

    /* Sobre Nós */
    .about { padding: 100px 0; background: var(--gray); }
    .about-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 4rem; align-items: center; }
    .about-text h2 { font-family: var(--font-title); font-size: 3rem; margin-bottom: 1.5rem; color: var(--primary); }
    .about-text p { color: #aaa; line-height: 1.8; }

    /* Cardápio */
    .menu { padding: 100px 0; }
    .menu-grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 4rem; }
    .menu-item { border-bottom: 1px solid #333; padding-bottom: 1rem; }
    .menu-item-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .menu-item-name { font-weight: 600; font-size: 1.2rem; }
    .menu-item-price { color: var(--primary); font-weight: 700; }
    .menu-item-desc { font-size: 0.9rem; color: #888; }

    /* Reservas */
    .booking { padding: 100px 0; background: var(--gray); text-align: center; }
    .booking-form { max-width: 600px; margin: 3rem auto; display: grid; gap: 1rem; }
    input, textarea { padding: 1rem; background: #0a0a0a; border: 1px solid #333; border-radius: 10px; color: white; }

    /* Floating WhatsApp */
    .whatsapp { position: fixed; bottom: 2rem; right: 2rem; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 100; }
    
    {{featureFlagsCss}}
  </style>
</head>
<body>

  <header>
    <div class="container nav">
      <a href="#" class="logo">{{nomeEmpresa}}</a>
      <div class="nav-links">
        <a href="#menu" class="btn-menu" style="color: white; margin-right: 2rem; text-decoration: none;">Cardápio</a>
        <a href="#reserva" class="btn">Reservar Mesa</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-content">
      <h1>{{nomeEmpresa}}</h1>
      <p>{{slogan}}</p>
      <a href="#menu" class="btn">Ver Cardápio</a>
    </div>
  </section>

  <section id="sobre" class="about">
    <div class="container about-grid">
      <div class="about-img">
        <img src="{{linkImagemSobre}}" alt="Sobre nós" style="width: 100%; border-radius: 20px;">
      </div>
      <div class="about-text">
        <h2>{{sobreNosTitulo}}</h2>
        <p>{{sobreNosTexto}}</p>
      </div>
    </div>
  </section>

  <section id="menu" class="menu">
    <div class="container">
      <h2 style="font-family: var(--font-title); font-size: 3rem; text-align: center;">Nosso Cardápio</h2>
      <div class="menu-grid">
        {{cardapioHtml}}
      </div>
    </div>
  </section>

  <section id="reserva" class="booking">
    <div class="container">
      <h2>{{reservaTitulo}}</h2>
      <p>{{reservaSubtitulo}}</p>
      <form class="booking-form">
        <input type="text" placeholder="Seu Nome">
        <input type="text" placeholder="Data (DD/MM)">
        <input type="number" placeholder="Pessoas">
        <button class="btn">Solicitar Reserva</button>
      </form>
    </div>
  </section>

  <a href="https://wa.me/{{telefoneWhatsapp}}" class="whatsapp" target="_blank">
    <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.886.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.438-9.889 9.886-.001 2.225.586 3.735 1.726 5.462l-.943 3.45 3.706-.972z"/></svg>
  </a>

  <footer style="padding: 5rem 0; text-align: center; border-top: 1px solid #222;">
    <p>&copy; {{nomeEmpresa}} - {{cidade}}</p>
  </footer>

</body>
</html>
